events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    client_max_body_size 50M;
    proxy_request_buffering off;
    proxy_buffering off;

    upstream basil_api {
        server basil-api:5000;
    }

    upstream basil_frontend {
        server basil-frontend:9000;
    }

    upstream graph_engine {
        server graph-engine:8001;
    }

    upstream basil_bridge {
        server basil-bridge:8002;
    }

    upstream reqflow_frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # --- BASIL API ---
        location /basil/api/ {
            rewrite ^/basil/api(/.*)$ $1 break;
            proxy_pass http://basil_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # --- Graph Engine API ---
        location /graph/api/ {
            rewrite ^/graph/api(/.*)$ $1 break;
            proxy_pass http://graph_engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # --- BASIL Bridge API ---
        location /bridge/api/ {
            rewrite ^/bridge/api(/.*)$ $1 break;
            proxy_pass http://basil_bridge;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # --- ReqFlow Frontend (Graph Visualization) ---
        location /viz/ {
            rewrite ^/viz(/.*)$ $1 break;
            proxy_pass http://reqflow_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- BASIL Frontend (SPA) ---
        location / {
            proxy_pass http://basil_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
    }
}
